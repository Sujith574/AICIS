services:
  - type: web
    name: aicis-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: MONGO_URI
        value: "mongodb://localhost:27017"
      - key: MONGO_DB
        value: "aicis_db"
      - key: MODEL_PATH
        value: "../ml/model.pkl"
      - key: SCALER_PATH
        value: "../ml/scaler.pkl"
      - key: PYTHONUTF8
        value: "1"
      - key: SECRET_KEY
        value: "aicis-super-secret-jwt-key-2026"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://sujith574.github.io"
